<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My table</title>
    <style>
        table{
            border-collapse: collapse;

        }
        td,th{
            border:solid 1px black;
            padding: 3px 5px;
        }
    </style>
    <link rel="icon" href="/style/baptiste_lheurette-mountain-5195052_1920.jpg">
</head>
<body>
    <table>
        <caption>Employee Information</caption>
        <TR>
            <TH>Cell Number</TH>
            <TH>Name</TH>
            <TH>Company</TH>
            <TH>Salary</TH>
        </TR>
        <TR>
            <TD>Cell 1</TD>
            <TD>Bill gates</TD>
            <TD>Microsoft</TD>
            <TD>$1200</TD>
        </TR>
        <tr>
            <th>
                Cell Number
            </th>
            <th>Name</th>
            <th>Company</th>
            <th>Salary</th>
        </tr>
        <TR>
            
            <TD> Cell 2</TD>
            <TD>Steve Jobs</TD>
            <TD>Apple</TD>
            <TD>$1500</TD>
            
        </TR>
        <TR>
            <TD>Cell 3</TD>
            <TD>Elon Musk</TD>
            <TD>Tesla</TD>
            <TD>$2000</TD>
        </TR>
       
        <tfoot>
            <tr>
                <TD rowspan="4">NICE AND ATTRACTIVE</TD>
                <td colspan="4">Total Employees: 3</td>
            </tr>
        </tfoot>


    </table>
</body>
</html>
