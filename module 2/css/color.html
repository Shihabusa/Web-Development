<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explore Basic Css</title>
    <STYLE>
        #p01p{
            color: red;
            background-color: yellow;
            text-align: center;
        }
        li{
            color:rgb(0, 243, 0);
        
        }
        p{
            color: blue;

            background-color: #d68686;
            width: 50%;
            
        }
        #embadded{
            font-size: larger;
            color: white;
            background-color: black;
            text-align: center;
            font-weight: bolder;
        }
        .play{
            font-size: medium;
            color: purple;
            background-color: lightgrey;
            text-align: right;
        }
    </STYLE>


</head>
<body>
    <h3 style="color:aqua;">Learning Basic CSS</h3>
    <h4 style="background-color: blue;">Inline css</h4>
    <p>Css meaning: Cascading Style Sheets </p>
    <p id="p01p">style is colorful</p>
    <p>needs style rule and value separated by a colon(:)</p>
    <p class="play">after each style you must end with a semicolon(;) to avoid errors </p>
    <ul>
        <li>inline styles</li>
        <li id="embadded">internal styles </li>
        <li class="play">external styles</li>
    </ul>
    
</body>
</html>
